[install]
header = "=== BC Free Flight Stream — Setup ==="
google_cloud_guide = [
    "",
    "  It looks like you don't have Google OAuth credentials yet.",
    "  Follow these steps to create them:",
    "",
    "  1. Go to https://console.cloud.google.com/",
    "  2. Click 'Select a project' at the top, then 'New Project'",
    "  3. Give it a name (e.g., 'BC Free Flight') and click 'Create'",
    "  4. Make sure your new project is selected at the top",
    "  5. In the left sidebar, go to 'APIs & Services' > 'Library'",
    "  6. Search for 'YouTube Data API v3' and click 'Enable'",
    "  7. In the sidebar, go to 'APIs & Services' > 'OAuth consent screen'",
    "     - Choose 'External' and click 'Create'",
    "     - Fill in the app name and your email address",
    "     - Click through the remaining steps (scopes, test users)",
    "     - Add your Google account as a test user",
    "  8. In the sidebar, go to 'APIs & Services' > 'Credentials'",
    "  9. Click 'Create Credentials' > 'OAuth client ID'",
    "  10. Select 'Desktop app' as the application type",
    "  11. Click 'Create'",
    "  12. Copy the 'Client ID' and 'Client Secret' from the popup",
    "",
]
broadcast_title_guide = [
    "",
    "  The broadcast title is updated each time --start runs.",
    "  Use {date} anywhere in the title to insert today's date (ISO format).",
    "",
    "  Examples:",
    "    My Launch: {date}          =>  My Launch: 2026-04-12",
    "    My Stream ({date})         =>  My Stream (2026-04-12)",
    "    Live Cam                   =>  Live Cam",
    "",
]
cron_guide = [
    "",
    "  Cron jobs will automatically start and stop your stream on a schedule.",
    "  A cron expression has five fields: minute, hour, day, month, weekday.",
    "",
    "  Examples:",
    "    30 6 * * *          = every day at 6:30 AM",
    "    30 6 1-31 4-10 *    = every day at 6:30 AM, April through October",
    "    0 8 * * 1-5         = weekdays at 8:00 AM",
    "",
    "  For help building cron expressions, visit: https://crontab.guru/",
    "",
]

[install.sections]
google = "── Google OAuth ──"
rtsp = "\n── RTSP Source ──"
youtube_broadcast = "\n── YouTube Broadcast ──"
schedule = "\n── Schedule ──"
youtube_setup = "\n── Setting up YouTube resources ──"

[install.prompts]
clientId = "Google OAuth 2.0 Client ID"
clientSecret = "Google OAuth 2.0 Client Secret"
rtspUrl = "RTSP URL of the camera stream"
videoCodec = "Video codec"
audioCodec = "Audio codec"
mute = "Mute audio? (yes/no)"
broadcastTitle = "Broadcast title template"
privacy = "Privacy (public/unlisted/private)"
categoryId = "YouTube category ID"
broadcastId = "Existing broadcast ID (leave empty to create new)"
cronSetup = "Set up automatic cron jobs? (yes/no)"
cronStart = "Cron start expression"
cronStop = "Cron stop expression"
cronAutoUpdate = "Enable automatic updates via cron? (yes/no)"
cronUpdate = "Cron update expression"

[install.defaults]
videoCodec = "copy"
audioCodec = "copy"
mute = "yes"
broadcastTitle = "My Location: {date}"
privacy = "public"
categoryId = "22"
broadcastId = ""
cronStart = "30 6 1-31 4-10 *"
cronStop = "25 18 1-31 4-10 *"
cronUpdate = "0 0 * * *"

[install.validation]
required = "  This field is required."
rtsp_url = "  URL must start with rtsp://"
yes_no = "  Enter yes or no"
privacy = "  Enter public, unlisted, or private"

[install.messages]
config_written = "\nConfig written to {path}"
secrets_written = "Secrets written to {path}"
ffmpeg_installed = "\nffmpeg is already installed"
ffmpeg_installing = "\nInstalling ffmpeg..."
deps_verified = "Python dependencies verified"
oauth_starting = "\nStarting OAuth flow — a browser window will open..."
oauth_saved = "OAuth tokens saved"
terminal_detected = "\nTerminal emulator: {terminal}"
cron_registered = "Crontab entries registered"
cron_skipped = "Cron setup skipped"
cron_removed = "Existing cron entries removed"
auto_update_enabled = "Auto-update cron registered"
auto_update_disabled = "Auto-update cron skipped"
auto_update_migrated = "Auto-update config defaults applied to existing install"
broadcast_id_label = "\n  Broadcast ID:  {broadcast_id}"
stream_url_label = "  Stream URL:    https://youtube.com/live/{broadcast_id}"

[install.summary]
header = "\n=== Setup Complete ==="
config = "  Config:        {path}"
secrets = "  Secrets:       {path}"
terminal = "  Terminal:      {terminal}"
cron_start = "  Cron start:    {schedule}"
cron_stop = "  Cron stop:     {schedule}"
cron_update = "  Cron update:   {schedule}"
youtube_url = "  YouTube URL:   https://youtube.com/live/{broadcast_id}"
run_hint = "\nRun 'python3 stream.py --start' to begin streaming."
edit_hint = "You can manually edit config.toml to adjust settings at any time."

[update]
fetch_failed = "Could not fetch latest release from GitHub."
already_latest = "Already running the latest version."
backup_created = "Backup created: {path}"
downloading = "Downloading {file}..."
download_failed = "Failed to download {file}: {error}"
restore_hint = "Your backup is at {path} if you need to restore."
success = "Updated to {version}. Restart the script to use the new version."

[rollback]
available_header = "\nAvailable backups:"
choose_prompt = "Enter number to restore (or 'q' to cancel): "
invalid_choice = "  Invalid selection. Try again."
no_backups = "No backups found in the backup directory."
not_found = "No backup found for version: {version}"
available_hint = "Run --roll-back without a version to see available backups."
cancelled = "Roll-back cancelled."
restoring = "Restoring from {version}..."
success = "Rolled back to {version}. Restart the script to use the restored version."

[errors]
missing_config = "Missing YouTube config: {fields}. Run 'python3 stream.py --install' first."
broadcast_unexpected = "Broadcast {broadcast_id} is in unexpected state: {status}"
