# BC Free Flight Stream — Configuration
# This file is generated by --install. You can manually edit it at any time.

# Path to the PID file written when --start is running
pidFile = "./stream.pid"

# Sentinel file whose presence tells the retry loop to stop
stopSentinel = "./stream.stop"

# Directory for daily log files
logDir = "./logs"

# Delete log files older than this many days
logRetentionDays = 15

# Seconds to wait between retry attempts when ffmpeg exits
retryDelaySecs = 5

# Terminal emulator used by the start cron job (auto-detected)
terminal = "gnome-terminal"

# Google OAuth 2.0 credentials — get these from the Cloud Console
[google]
clientId = ""

# RTSP camera source and ffmpeg codec settings
[stream]
rtspUrl = ""
videoCodec = "copy"
audioCodec = "copy"
mute = false

# YouTube broadcast and stream configuration
[youtube]
# Title template — {date} is replaced with today's date (e.g. "My Location: 2026-04-12")
broadcastTitle = "My Location: {date}"

# Broadcast privacy: public, unlisted, or private
privacy = "public"

# YouTube category ID (22 = "People & Blogs")
categoryId = "22"

# Enable the YouTube monitor stream
enableMonitorStream = false

# Persistent broadcast ID — created by --install, reused by --start
broadcastId = ""

# Primary RTMP ingest URL
streamURL = ""

# Backup RTMP ingest URL — used on odd-numbered retry attempts
backupStreamUrl = ""

# Stream key for the RTMP URL
streamKey = ""

# Cron schedule for automatic start/stop (crontab expressions)
[cron]
enabled = true
start = "30 6 1-31 4-10 *"
stop = "25 18 1-31 4-10 *"
